<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier Étudiant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background: #eee; }
        .box { max-width: 400px; margin: 50px auto; background: #fff; padding: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="box">
    <h2 class="h5 mb-3">Modifier l'élève</h2>
    
    <div class="mb-2">
        <label>Nom</label>
        <input type="text" id="nom" class="form-control">
    </div>
    <div class="mb-2">
        <label>Prénom</label>
        <input type="text" id="prenom" class="form-control">
    </div>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" id="email" class="form-control">
    </div>

    <button class="btn btn-primary w-100 mb-2" onclick="modifier()">Enregistrer</button>
    <button class="btn btn-danger w-100 mb-2" onclick="supprimer()">Supprimer</button>
    <a href="index.html" class="btn btn-secondary w-100">Annuler</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");
    const api = "http://192.168.1.224/ciel2027/api/etudiants.php";

  
    if (id) {
        fetch(`${api}?id=${id}`)
            .then(r => r.json())
            .then(data => {
                // On gère si l'API renvoie un tableau ou un objet direct
                const d = Array.isArray(data) ? data[0] : data;
                document.getElementById("nom").value = d.nom;
                document.getElementById("prenom").value = d.prenom;
                document.getElementById("email").value = d.email;
            });
    }

   
    async function modifier() {
        const obj = {
            id: id,
            nom: document.getElementById("nom").value,
            prenom: document.getElementById("prenom").value,
            email: document.getElementById("email").value
        };

        const res = await fetch(api, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(obj)
        });

        if (res.ok) location.href = "index.html";
        else alert("Erreur MAJ");
    }

   
    async function supprimer() {
