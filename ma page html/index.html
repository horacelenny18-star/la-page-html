<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des Étudiants - BTS CIEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .table-container { background: white; padding: 20px; border-radius: 10px; shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1 class="mb-4">Registre des Étudiants</h1>

    <div class="table-container shadow-sm">
        <div class="mb-3">
            <a href="create_etudiant.html" class="btn btn-success">Ajouter un étudiant</a>
        </div>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="tableau">
                </tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var req = new XMLHttpRequest();
        var url_api = 'http://192.168.1.224/ciel2027/api/etudiants.php';
        
        req.open("GET", url_api, true);
        req.send();

        req.onload = function() {
            if (req.status === 200) {
                var json = JSON.parse(req.responseText);
                var html = "";
                
                json.forEach(function(val) {
                    html += "<tr>";
                    html += "<td><a href='update_etudiant.html?id=" + val.id + "' class='fw-bold text-primary'>" + val.nom.toUpperCase() + "</a></td>";
                    html += "<td>" + val.prenom + "</td>";
                    html += "<td>" + val.email + "</td>";
                    html += "</tr>";
                });

                document.getElementById('tableau').innerHTML = html;
            } else {
                console.error("Erreur lors de la récupération des données");
            }
        };
    });
</script>

</body>
</html>
